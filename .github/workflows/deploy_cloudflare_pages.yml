name: deploy_cloudflare_pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'snapshots/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' && vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' && vars.CLOUDFLARE_PAGES_PROJECT_NAME || secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 运行环境
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 配置 pnpm 包管理器
        uses: pnpm/action-setup@v4

      - name: 安装项目依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build

      - name: 校验 Cloudflare 配置
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID variable"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN secret"; exit 1; }
          test -n "$CLOUDFLARE_PAGES_PROJECT_NAME" || { echo "Missing CLOUDFLARE_PAGES_PROJECT_NAME variable"; exit 1; }

      - name: 部署到 Cloudflare Pages
        run: pnpm dlx wrangler@4.71.0 pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME"
